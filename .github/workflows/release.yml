name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Create .app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          APP="Ephemeral Browser.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/${{ matrix.target }}/release/ephemeral-browser "$APP/Contents/MacOS/"

          # Convert logo.png to .icns via iconutil
          ICONSET="icon.iconset"
          mkdir -p "$ICONSET"
          for size in 16 32 128 256 512; do
            sips -z $size $size logo.png --out "$ICONSET/icon_${size}x${size}.png" > /dev/null
            double=$((size * 2))
            sips -z $double $double logo.png --out "$ICONSET/icon_${size}x${size}@2x.png" > /dev/null
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/icon.icns"
          rm -rf "$ICONSET"

          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Ephemeral Browser</string>
            <key>CFBundleExecutable</key>
            <string>ephemeral-browser</string>
            <key>CFBundleIdentifier</key>
            <string>com.github.ephemeral-browser</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>icon</string>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>
          PLIST
          tar czf ephemeral-browser-${{ github.ref_name }}-${{ matrix.target }}.app.tar.gz "$APP"

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ephemeral-browser-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ephemeral-browser

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../ephemeral-browser-${{ github.ref_name }}-${{ matrix.target }}.zip ephemeral-browser.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ephemeral-browser-${{ matrix.target }}
          path: ephemeral-browser-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ephemeral-browser-*
          generate_release_notes: true
